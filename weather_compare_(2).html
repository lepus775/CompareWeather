<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>날씨 비교 — 어제 vs 오늘 (실측/예보 하이브리드)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f4f4f2; --bg3: #eeecea;
      --text: #1a1a18; --text2: #6b6b67; --border: rgba(0,0,0,0.1);
      --info-bg: #e6f1fb; --info-text: #185fa5;
      --danger-bg: #fcebeb; --danger-text: #a32d2d;
      --radius-md: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c; --bg2: #2a2a28; --bg3: #343430;
        --text: #f0f0ec; --text2: #9a9a94; --border: rgba(255,255,255,0.1);
        --info-bg: #0c447c; --info-text: #b5d4f4;
        --danger-bg: #791f1f; --danger-text: #f7c1c1;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 16px; }
    .card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 20px 20px 24px; max-width: 860px; margin: 0 auto; }
    .header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .header h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: var(--text2); min-height: 18px; }
    .btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .btn { font-size: 13px; padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: background 0.15s; }
    .btn.active { background: var(--info-bg); color: var(--info-text); border-color: var(--info-text); }
    .metric-cards { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 20px; }
    @media (max-width: 500px) { .metric-cards { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    .metric-card { background: var(--bg2); border-radius: var(--radius-md); padding: 12px; }
    .metric-card .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
    .metric-card .value { font-size: 20px; font-weight: 500; }
    .legend { display: flex; gap: 18px; margin-bottom: 10px; font-size: 11px; color: var(--text2); flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .leg-yest { width: 20px; height: 2px; background: #3266ad; }
    .leg-today-past { width: 20px; height: 3px; background: #e07b39; }
    .leg-today-future { width: 20px; height: 0; border-top: 3px dashed #e07b39; }
    .chart-wrap { position: relative; width: 100%; height: 320px; }
    .location-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .location-row select { font-size: 13px; padding: 6px 12px; border-radius: var(--radius-md); background: var(--bg2); color: var(--text); border: 0.5px solid var(--border); outline: none; }
    .error-box { display: none; margin-top: 14px; padding: 12px; background: var(--danger-bg); border-radius: var(--radius-md); color: var(--danger-text); font-size: 13px; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--info-text); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-left: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <div>
      <h1>날씨 비교 대시보드</h1>
      <p class="subtitle" id="subtitle">데이터를 불러오는 중입니다… <span class="spinner"></span></p>
    </div>
    <div class="btn-group">
      <button class="btn active" id="btn-temperature" onclick="setMetric('temperature')">🌡 기온</button>
      <button class="btn" id="btn-precipitation" onclick="setMetric('precipitation')">🌧 강수</button>
      <button class="btn" id="btn-windspeed" onclick="setMetric('windspeed')">💨 풍속</button>
      <button class="btn" id="btn-humidity" onclick="setMetric('humidity')">💧 습도</button>
    </div>
  </div>

  <div class="location-row">
    <select id="preset" onchange="load()">
      <option value="60,127,서울">서울</option>
      <option value="102,84,울산" selected>울산</option>
      <option value="98,76,부산">부산</option>
      <option value="55,124,인천">인천</option>
      <option value="89,90,대구">대구</option>
      <option value="52,38,제주">제주</option>
    </select>
    <button class="btn" onclick="load()" style="background: var(--bg2);">조회/새로고침</button>
  </div>

  <div class="metric-cards">
    <div class="metric-card"><p class="label">어제 최고</p><p class="value" id="card-ymax">—</p></div>
    <div class="metric-card"><p class="label">오늘 최고(예보)</p><p class="value" id="card-tmax">—</p></div>
    <div class="metric-card"><p class="label">현재 시각</p><p class="value" id="card-now">—</p></div>
    <div class="metric-card"><p class="label">업데이트 상태</p><p class="value" id="card-status" style="font-size:14px">대기 중</p></div>
  </div>

  <div class="legend">
    <div class="legend-item"><span class="leg-yest"></span> 어제 실측</div>
    <div class="legend-item"><span class="leg-today-past"></span> 오늘 실측 (지나감)</div>
    <div class="legend-item"><span class="leg-today-future"></span> 오늘 예보 (남음)</div>
  </div>

  <div class="chart-wrap"><canvas id="weatherChart"></canvas></div>
  <div class="error-box" id="error-box"></div>
</div>

<script>
/* ── 환경 설정 ─────────────────────────────────── */
const KMA_KEY = '49197eae3f409cebe5a5f80e98b02f9049640217e1511666c3a8a1229f8fd9ca';
const BASE_URL = 'https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0';
const LABELS = Array.from({length: 24}, (_, i) => i + ':00');
const METRICS = {
  temperature: { unit: '°C', yLabel: '기온 (°C)' },
  precipitation: { unit: 'mm', yLabel: '강수량 (mm)' },
  windspeed: { unit: 'm/s', yLabel: '풍속 (m/s)' },
  humidity: { unit: '%', yLabel: '습도 (%)' }
};

let chart = null, currentMetric = 'temperature';
let yDataAll = {}, tDataAll = {};
const now = new Date();
const nowH = now.getHours();

/* ── 유틸리티 함수 ─────────────────────────────── */
function getKMAFormattedDate(date) {
  return date.getFullYear() + String(date.getMonth()+1).padStart(2,'0') + String(date.getDate()).padStart(2,'0');
}

async function fetchKMA(endpoint, params) {
  const query = new URLSearchParams({
    serviceKey: KMA_KEY, dataType: 'JSON', numOfRows: 1000, pageNo: 1, ...params
  });
  const res = await fetch(`${BASE_URL}/${endpoint}?${query.toString()}`);
  if (!res.ok) throw new Error("네트워크 응답이 없습니다.");
  const json = await res.json();
  const resultCode = json.response?.header?.resultCode;
  if (resultCode && resultCode !== '00') throw new Error(`API 오류: ${resultCode}`);
  return json.response?.body?.items?.item || [];
}

function parsePCP(val) {
  if (!val || val === '강수없음') return 0;
  if (val.includes('미만')) return 0.1;
  const m = val.match(/[\d.]+/);
  return m ? parseFloat(m[0]) : 0;
}

function parseItems(items, targetDate) {
  const res = { temperature: Array(24).fill(null), precipitation: Array(24).fill(0), windspeed: Array(24).fill(null), humidity: Array(24).fill(null) };
  items.forEach(item => {
    if (item.fcstDate !== targetDate) return;
    const h = parseInt(item.fcstTime.substring(0,2));
    if (item.category === 'TMP') res.temperature[h] = parseFloat(item.fcstValue);
    if (item.category === 'PCP') res.precipitation[h] = parsePCP(item.fcstValue);
    if (item.category === 'WSD') res.windspeed[h] = parseFloat(item.fcstValue);
    if (item.category === 'REH') res.humidity[h] = parseFloat(item.fcstValue);
  });
  return res;
}

/* ── 데이터 로드 및 처리 ─────────────────────────── */
async function load() {
  const [nx, ny, locName] = document.getElementById('preset').value.split(',');
  const subtitleEl = document.getElementById('subtitle');
  subtitleEl.innerHTML = `${locName} 데이터를 분석 중… <span class="spinner"></span>`;
  document.getElementById('error-box').style.display = 'none';

  try {
    const yestDate = new Date(); yestDate.setDate(yestDate.getDate() - 1);
    const todayStr = getKMAFormattedDate(now);
    const yestStr = getKMAFormattedDate(yestDate);

    // 0200 발표 데이터를 기준으로 00시~23시 예보 추출
    const [yItems, tItems] = await Promise.all([
      fetchKMA('getVilageFcst', { base_date: yestStr, base_time: '0200', nx, ny }),
      fetchKMA('getVilageFcst', { base_date: todayStr, base_time: '0200', nx, ny })
    ]);

    yDataAll = parseItems(yItems, yestStr);
    tDataAll = parseItems(tItems, todayStr);

    // 상단 카드 업데이트
    const validY = yDataAll.temperature.filter(v => v !== null);
    const validT = tDataAll.temperature.filter(v => v !== null);
    document.getElementById('card-ymax').textContent = validY.length ? Math.max(...validY).toFixed(1)+'°C' : '—';
    document.getElementById('card-tmax').textContent = validT.length ? Math.max(...validT).toFixed(1)+'°C' : '—';
    document.getElementById('card-now').textContent = nowH + ':00';
    document.getElementById('card-status').textContent = '수신 완료';
    subtitleEl.textContent = `${locName} 실시간 비교 차트 (${todayStr})`;

    buildChart();
  } catch(e) {
    document.getElementById('card-status').textContent = '수신 실패';
    showError("데이터를 가져오는 중 오류가 발생했습니다. (API 키 혹은 CORS 확인)");
    console.error(e);
  }
}

/* ── 차트 생성 ─────────────────────────────────── */
function buildChart() {
  if (chart) chart.destroy();
  const ctx = document.getElementById('weatherChart').getContext('2d');
  const metric = METRICS[currentMetric];
  
  const yData = yDataAll[currentMetric];
  const tFull = tDataAll[currentMetric];
  
  // 오늘 데이터를 현재 시각(nowH) 기준으로 실선/점선 분리
  const tPast = tFull.map((v, i) => i <= nowH ? v : null);
  const tFuture = tFull.map((v, i) => i >= nowH ? v : null);

  const isPrecip = currentMetric === 'precipitation';

  chart = new Chart(ctx, {
    type: isPrecip ? 'bar' : 'line',
    data: {
      labels: LABELS,
      datasets: [
        {
          label: '어제 실측',
          data: yData,
          borderColor: '#3266ad',
          backgroundColor: isPrecip ? 'rgba(50,102,173,0.3)' : 'transparent',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: isPrecip
        },
        {
          label: '오늘 실측',
          data: tPast,
          borderColor: '#e07b39',
          backgroundColor: isPrecip ? 'rgba(224,123,57,0.5)' : 'transparent',
          borderWidth: 3, // 지나간 시간은 굵게 표시
          pointRadius: 2,
          tension: 0.3,
          fill: isPrecip
        },
        {
          label: '오늘 예보',
          data: tFuture,
          borderColor: '#e07b39',
          backgroundColor: 'transparent',
          borderWidth: 2,
          borderDash: [5, 5], // 남은 시간은 점선
          pointRadius: 0,
          tension: 0.3,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => ` ${ctx.dataset.label}: ${ctx.parsed.y !== null ? ctx.parsed.y.toFixed(1) + metric.unit : '데이터 없음'}`
          }
        }
      },
      scales: {
        x: { grid: { display: false } },
        y: { 
          beginAtZero: false,
          title: { display: true, text: metric.yLabel, font: { size: 11 } }
        }
      }
    }
  });
}

function setMetric(m) {
  currentMetric = m;
  document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
  if (Object.keys(yDataAll).length) buildChart();
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.style.display = 'block';
}

/* ── 초기 실행 ─────────────────────────────────── */
load();
</script>
</body>
</html>
